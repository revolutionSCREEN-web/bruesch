<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Digitales Glücksrad</title>

  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/easywheel.css">
  <link rel="stylesheet" href="css/signage.css">
</head>
<body>

  <!-- ================= Hintergrund ================= -->
  <canvas id="bg-canvas"></canvas>              <!-- animierte Marine-Szene (Radar/Wind/Leuchtturm) -->
  <video id="bg-video" autoplay muted loop playsinline></video>  <!-- optionales Video (falls konfiguriert) -->
  <div id="bg-scrim"></div>

  <!-- ================= Bühne (Querformat: links Text, rechts Rad) ===== -->
  <div id="stage">
    <div class="brand-col">
      <img id="brand-logo" class="logo" src="" alt="Logo">
      <div class="intro-message">
        <strong id="brand-title"></strong>
        <span class="brand-rule" aria-hidden="true"></span>
        <div id="brand-subtitle"></div>
      </div>
      <div id="cta-hint" class="cta-hint"></div>
    </div>

    <div class="wheel-col">
      <div class="wheel-wrap">
        <div class="easywheel"></div>
      </div>
    </div>

    <!-- vom Plugin als Start-Button verdrahtet, unsichtbar -->
    <a href="#" class="spin-to-win" id="spin" style="display:none;">Spin</a>
  </div>

  <!-- ================= Ergebnis-Overlay ================= -->
  <div id="overlay" class="overlay" aria-hidden="true">
    <div class="overlay-card">
      <div id="overlay-title" class="overlay-title"></div>
      <div id="overlay-text"  class="overlay-text"></div>
      <div id="overlay-prize" class="overlay-prize"></div>
      <div id="overlay-note"  class="overlay-note"></div>
      <div id="overlay-qr"    class="overlay-qr"></div>
      <div id="overlay-qrhint" class="overlay-qrhint"></div>
      <div id="overlay-countdown" class="overlay-countdown">
        <div class="cd-text" id="cd-text"></div>
        <div class="cd-bar"><div id="cd-fill" class="cd-fill"></div></div>
      </div>
    </div>
  </div>

  <!-- Tick-Sound -->
  <audio id="tick" src="assets/media/tick.mp3" preload="auto"></audio>

  <!-- ================= Skripte ================= -->
  <script src="js/jquery.min.js"></script>
  <script src="js/jquery.easing.1.3.js"></script>
  <script src="js/jquery.easywheel.min.js"></script>
  <script src="js/qrcode.min.js"></script>
  <script src="js/marine-bg.js"></script>
  <script src="config.js"></script>
  <script src="js/app.js"></script>
  <!-- Optionaler zweiter Auslöser über den Sensor Hub; tut nichts,
       solange sensorHub.enabled in config.js auf false steht. -->
  <script src="js/sensorhub.js"></script>
  <script src="js/sensorhub-anbindung.js"></script>
</body>
</html>
